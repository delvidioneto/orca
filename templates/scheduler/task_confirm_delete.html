{% extends 'base.html' %}

{% block title %}Deletar Tarefa - Orca{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-exclamation-triangle"></i> Deletar Tarefa</h1>
</div>

<div class="card">
    <div class="card-body">
        <p>Tem certeza que deseja deletar a tarefa <strong>{{ object.name }}</strong>?</p>
        <p class="text-danger">Esta ação não pode ser desfeita.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-between">
                <a href="{% url 'scheduler:pipeline_detail' object.pipeline.id %}" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-danger">Deletar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
