{% extends 'base.html' %}

{% block title %}Documentação - Orca{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-journal-text"></i> Documentação</h1>
    <p class="text-muted mb-0">Guia do Orca: pipelines, tarefas, agendamento, RPA e arquitetura.</p>
</div>

<div class="row g-4">
    {% for doc in doc_entries %}
    <div class="col-md-6 col-lg-4">
        <a href="{% url 'documentacao_page' slug=doc.slug %}" class="text-decoration-none text-dark">
            <div class="card h-100 doc-card border-0 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <div class="doc-icon mb-3">
                        <i class="bi {{ doc.icon }} fs-2 text-primary"></i>
                    </div>
                    <h2 class="h5 card-title">{{ doc.title }}</h2>
                    <p class="card-text text-muted small flex-grow-1">{{ doc.description }}</p>
                    <span class="text-primary small fw-medium">Ler mais <i class="bi bi-arrow-right"></i></span>
                </div>
            </div>
        </a>
    </div>
    {% endfor %}
</div>

<style>
.doc-card { transition: transform 0.2s ease, box-shadow 0.2s ease; border-radius: 12px; }
.doc-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important; }
.doc-icon { color: var(--primary-yellow-dark, #f39c12); }
</style>
{% endblock %}
